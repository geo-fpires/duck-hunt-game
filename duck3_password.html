<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Password - Duck 3</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fef3c7; /* Light yellow background */
            color: #1f2933;
            text-align: center;
            padding: 0px;
        }
        .container {
            background-color: #fff;
            border: 2px solid #f59e0b;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 16px rgba(180,83,9,0.25);
            max-width: 275px;
            width: 100%;
        }
        h1 {
            font-size: 2.5rem;
            color: #f97316; /* Orange color for the title */
            margin-bottom: 0px;
        }
        .duck-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #f59e0b;
            box-shadow: 0 4px 8px rgba(120,53,15,0.35);
        }
        .password-label {
            font-size: 1.2rem;
            color: #4b5563;
            margin-bottom: 10px;
        }
        .password-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: #22c55e; /* Green color for the password */
            background-color: #e0ffe0; /* Light green background for password */
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px dashed #16a34a;
            display: inline-block;
            margin-bottom: 20px;
        }
        .instructions {
            font-size: 0.9rem;
            color: #374151;
            line-height: 1.5;
        }
        .back-to-game-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #f97316; /* Orange button */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .back-to-game-btn:hover {
            background-color: #ea580c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Duck 3</h1>
        <img src="duck.png" alt="Duck 3" class="duck-image">
        <div class="password-label">Your password is:</div>
        <div class="password-value">DUCK-3-MAD</div>
        <div class="instructions">
            Remember this password and type it into the game page to unlock your task!
        </div>
        <a href="index.html" class="back-to-game-btn">Back to Game</a>
    </div>
</body>
</html>
