<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Hunt - Would Aura Farm</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    @font-face {
      font-family: 'RubberDuck';
      src: url('rubber-duck.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --accent: #22c55e;
      --error: #dc2626;
      --text: #1f2933;
      --muted: #4b5563;
      --border: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* Degradê do branco (topo) para o amarelo (base) */
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #fef9c3 30%,
        #fde68a 70%,
        #facc15 100%
      );
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centraliza o conteúdo horizontalmente */
      /* Removido justify-content: center; para que o header fique no topo */
    }

    header {
      text-align: center;
      padding: 50px; /* Padding geral */
      margin-top: 50px; /* Adiciona um espaço do topo da página */
      margin-bottom: 20px; /* Espaço entre o header e o conteúdo abaixo */
    }

    .game-logo {
      width: 150px;
      height: auto;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    }

    .game-title {
      font-family: 'RubberDuck', regular;
      font-size: 8.5rem;
      letter-spacing: 0.08em;
      color: #3333cc; /* Cor azul sólida */
      /* Removido -webkit-text-stroke e text-stroke */
      /* Removido text-shadow */
      margin-bottom: 10px;
      white-space: nowrap;
      text-transform: capitalize; /* Apenas a primeira letra de cada palavra em maiúscula */
    } 

    .subtitle {
      font-size: 1rem;
      color: #374151;
      margin-top: 8px;
    }

    .grid {
      width: 100%;
      max-width: 1240px;
      padding: 16px 16px 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* CARD */
    .card {
      background: radial-gradient(circle at top, #fef9c3 0, #fef3c7 50%, #fde68a 100%);
      border-radius: 20px;
      border: 2px solid var(--border);
      box-shadow: 0 4px 0 rgba(234,179,8,0.85), 0 12px 28px rgba(180,83,9,0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .duck-btn {
      width: 100%;
      border: none;
      background: none;
      cursor: pointer;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform 0.15s;
    }

    .duck-btn:hover { transform: translateY(-3px) scale(1.02); }
    .duck-btn:active { transform: translateY(1px) scale(0.98); }
    .duck-btn.locked { cursor: not-allowed; opacity: 0.7; } /* Style for locked cards */


    .duck-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(120,53,15,0.35);
      background: #fde68a;
    }

    .duck-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.2) contrast(1.05);
      transform: scale(1.02);
    }

    .duck-cover.cleared {
      filter: grayscale(0.5);
    }

    .cleared-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(34, 197, 94, 0.7);
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      border-radius: 16px;
    }

    .tier-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #92400e;
      background: rgba(253,224,71,0.9);
      border: 1px solid rgba(234,179,8,0.8);
      padding: 2px 8px;
      border-radius: 999px;
      align-self: flex-start;
      margin-left: 2px;
    }

    .aura-label {
      font-size: 0.72rem;
      color: #166534;
      font-weight: 600;
      align-self: flex-end;
      margin-right: 2px;
    }

    .collapse {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .collapse.open { max-height: 620px; }

    .collapse-inner {
      padding: 10px 14px 16px;
      border-top: 1px solid rgba(234,179,8,0.5);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label-small {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .pw-row {
      display: flex;
      gap: 6px;
    }

    input[type="password"],
    textarea {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #facc15;
      background: rgba(255,251,235,0.97);
      color: var(--text);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      outline: none;
    }

    textarea {
      flex: 1;
      border-radius: 10px;
      min-height: 80px;
      resize: vertical;
      padding: 10px;
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #16a34a; }
    .btn:active { background: #15803d; }

    .error-msg {
      color: var(--error);
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .task-text {
      font-size: 0.9rem;
      line-height: 1.4;
      color: var(--text);
    }

    .task-note {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
    }

    .gap-list {
      list-style: none;
      padding-left: 0;
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .gap-list li {
      margin-bottom: 4px;
      padding-left: 16px;
      position: relative;
    }
    .gap-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .success-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: #ecfdf5;
      border: 1px solid #34d399;
      border-radius: 10px;
      margin-top: 10px;
    }
    .success-main {
      font-size: 1.2rem;
      font-weight: bold;
      color: #059669;
    }
    .success-sub {
      font-size: 0.9rem;
      color: #047857;
    }
    .success-timer {
      font-size: 0.8rem;
      color: #065f46;
    }

    /* Scoreboard */
    .scoreboard-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .scoreboard-content {
      background: linear-gradient(to bottom, #fef9c3 0%, #fde68a 100%);
      border-radius: 20px;
      padding: 30px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      color: var(--text);
      text-align: center;
    }

    .scoreboard-title {
      font-family: 'RubberDuck', regular;
      font-size: 4rem;
      color: #3333cc;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      margin-bottom: 40px;
      gap: 20px;
      height: 250px; /* Altura fixa para o pódio */
    }

    .podium-spot {
      background: #fff;
      border-radius: 10px;
      padding: 15px 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end; /* Alinha o conteúdo na parte inferior */
      position: relative;
      width: 120px;
      min-height: 150px; /* Altura mínima para os spots */
    }

    .podium-spot.first {
      height: 220px;
      background: linear-gradient(to top, #ffd700, #ffec8b); /* Ouro */
      border: 2px solid #daa520;
      transform: translateY(-10px);
    }
    .podium-spot.second {
      height: 180px;
      background: linear-gradient(to top, #c0c0c0, #e0e0e0); /* Prata */
      border: 2px solid #a9a9a9;
    }
    .podium-spot.third {
      height: 150px;
      background: linear-gradient(to top, #cd7f32, #e6b88c); /* Bronze */
      border: 2px solid #8b4513;
    }

    .podium-rank {
      font-size: 2.5rem;
      margin-bottom: 5px;
    }
    .podium-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      word-break: break-word; /* Quebra palavras longas */
    }
    .podium-aura {
      font-size: 1rem;
      color: #555;
    }

    .all-scores-list {
      list-style: none;
      padding: 0;
      margin-top: 30px;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #facc15;
      padding-top: 20px;
    }

    .all-scores-list li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #fde68a;
      font-size: 1rem;
      color: #4b5563;
    }
    .all-scores-list li:last-child {
      border-bottom: none;
    }

    .close-scoreboard-btn {
      margin-top: 30px;
      background: #dc2626;
    }
    .close-scoreboard-btn:hover { background: #b91c1c; }

    /* Game Controls */
    .game-controls {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .game-timer {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text);
      background: #fef3c7;
      padding: 8px 15px;
      border-radius: 999px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .game-timer.ended {
      color: var(--error);
      border-color: var(--error);
    }

    .hunter-display {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      background: #e0f2fe;
      padding: 8px 15px;
      border-radius: 999px;
      border: 1px solid #93c5fd;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hunter-input-area {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .hunter-input-area input {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #facc15;
      outline: none;
      font-size: 0.9rem;
    }

    .hunter-input-area .btn {
      background: #3b82f6;
    }
    .hunter-input-area .btn:hover { background: #2563eb; }

    /* Media Queries for Responsiveness */
    @media (max-width: 768px) {
      .game-title {
        font-size: 5rem;
      }
      .grid {
        grid-template-columns: repeat(2, 1fr);
        padding: 10px;
      }
      .podium-container {
        flex-direction: column;
        align-items: center;
        height: auto;
      }
      .podium-spot {
        width: 100px;
        min-height: 100px;
        margin-bottom: 10px;
      }
      .podium-spot.first { height: 150px; }
      .podium-spot.second { height: 120px; }
      .podium-spot.third { height: 100px; }
      .podium-rank { font-size: 2rem; }
      .scoreboard-title { font-size: 3rem; }
      .game-controls, .hunter-input-area {
        flex-direction: column;
        align-items: stretch;
      }
    }

    @media (max-width: 480px) {
      .game-title {
        font-size: 3rem;
      }
      .grid {
        grid-template-columns: 1fr;
      }
      .podium-spot {
        width: 80%;
      }
      .scoreboard-title { font-size: 2rem; }
    }
  </style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <header>
    <img src="duck-hunt-logo.png" alt="Duck Hunt Logo" class="game-logo">
    <h1 class="game-title">Duck Hunt</h1>
    <p class="subtitle">Would Aura Farm</p>
  </header>

  <div class="hunter-input-area">
    <input type="text" id="hunterNameInput" placeholder="Enter your hunter name">
    <button class="btn" id="setHunterNameBtn">Start Hunting</button>
  </div>

  <div class="game-controls">
    <div class="hunter-display" id="hunterDisplay">Hunter: N/A | Aura: 0</div>
    <div class="game-timer" id="gameTimer">Time: --:--</div>
    <button class="btn" id="endGameBtn">End Game</button>
    <button class="btn" id="resetGameBtn">Reset Game</button>
  </div>

  <main class="grid" id="ducksGrid"></main>

  <div class="scoreboard-overlay" id="scoreboardOverlay" style="display: none;">
    <div class="scoreboard-content">
      <h2 class="scoreboard-title">Final Scoreboard</h2>
      <div class="podium-container" id="podiumContainer">
        <!-- Podium spots will be inserted here by JavaScript -->
      </div>
      <ul class="all-scores-list" id="allScoresList">
        <!-- All scores will be listed here by JavaScript -->
      </ul>
      <button class="btn close-scoreboard-btn" id="closeScoreboardBtn">Close Scoreboard</button>
    </div>
  </div>

  <script>
    // --- CONFIGURAÇÃO DO FIREBASE ---
    const firebaseConfig = {
      apiKey: "AIzaSyC_SEU_API_KEY_AQUI", // Substitua pelo seu API Key
      authDomain: "SEU_AUTH_DOMAIN_AQUI", // Substitua pelo seu Auth Domain
      databaseURL: "https://SEU_PROJECT_ID-default-rtdb.firebaseio.com", // Substitua pelo seu Database URL
      projectId: "SEU_PROJECT_ID_AQUI", // Substitua pelo seu Project ID
      storageBucket: "SEU_STORAGE_BUCKET_AQUI", // Substitua pelo seu Storage Bucket
      messagingSenderId: "SEU_MESSAGING_SENDER_ID_AQUI", // Substitua pelo seu Messaging Sender ID
      appId: "SEU_APP_ID_AQUI" // Substitua pelo seu App ID
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const playersRef = db.ref('players');
    const gameStatusRef = db.ref('gameStatus');
    const serverTimestamp = firebase.database.ServerValue.TIMESTAMP;

    // --- CONSTANTES E VARIÁVEIS GLOBAIS ---
    const TEACHER_PASSWORD = "teacherpassword"; // Senha do professor
    const MASTER_TEACHER_PASSWORD = "masterpassword"; // Senha mestra para desbloquear patos
    const ALL_STUDENTS_KEY = "allStudents"; // Chave para armazenar todos os alunos no localStorage

    let currentHunter = null; // Objeto do caçador logado
    let allStudents = JSON.parse(localStorage.getItem(ALL_STUDENTS_KEY)) || {};
    let gameEnded = false; // Estado do jogo: true se o jogo terminou, false caso contrário
    let gameTimerInterval = null; // Para controlar o intervalo do timer

    // --- ELEMENTOS DO DOM ---
    const hunterNameInput = document.getElementById("hunterNameInput");
    const setHunterNameBtn = document.getElementById("setHunterNameBtn");
    const hunterDisplay = document.getElementById("hunterDisplay");
    const ducksGrid = document.getElementById("ducksGrid");
    const gameTimerElement = document.getElementById("gameTimer");
    const endGameBtn = document.getElementById("endGameBtn");
    const resetGameBtn = document.getElementById("resetGameBtn");
    const scoreboardOverlay = document.getElementById("scoreboardOverlay");
    const closeScoreboardBtn = document.getElementById("closeScoreboardBtn");
    const podiumContainer = document.getElementById("podiumContainer");
    const allScoresList = document.getElementById("allScoresList");

    // --- DADOS DOS PATOS E MISSÕES ---
    const ducks = [
      { id: "duck1", image: "duck1.png", password: "DUCK1", tier: "Common", aura: 10 },
      { id: "duck2", image: "duck2.png", password: "DUCK2", tier: "Uncommon", aura: 20 },
      { id: "duck3", image: "duck3.png", password: "DUCK3", tier: "Rare", aura: 30 },
      { id: "duck4", image: "duck4.png", password: "DUCK4", tier: "Epic", aura: 40 },
      { id: "duck5", image: "duck5.png", password: "DUCK5", tier: "Legendary", aura: 50 },
      { id: "duck6", image: "duck6.png", password: "DUCK6", tier: "Mythic", aura: 60 },
      { id: "duck7", image: "duck7.png", password: "DUCK7", tier: "Common", aura: 10 },
      { id: "duck8", image: "duck8.png", password: "DUCK8", tier: "Uncommon", aura: 20 },
      { id: "duck9", image: "duck9.png", password: "DUCK9", tier: "Rare", aura: 30 },
    ];

    const tasks = {
      duck1: { text: "What is the capital of France?", placeholder: "Paris" },
      duck2: { text: "Name two primary colors.", gaps: ["Red", "Blue"], placeholder: "Red, Blue" },
      duck3: { text: "Solve: 5 + 3 = ?", placeholder: "8" },
      duck4: { text: "What is the largest ocean?", placeholder: "Pacific Ocean" },
      duck5: { text: "Who painted the Mona Lisa?", placeholder: "Leonardo da Vinci" },
      duck6: { text: "What is the chemical symbol for water?", placeholder: "H2O" },
      duck7: { text: "Which planet is known as the Red Planet?", placeholder: "Mars" },
      duck8: { text: "What is the square root of 81?", placeholder: "9" },
      duck9: { text: "Name a famous scientist.", placeholder: "Albert Einstein" },
    };

    // --- FUNÇÕES DE UTILIDADE ---

    // NOVO: Função para atualizar o display do caçador
    function updateHunterDisplay() {
      if (currentHunter && currentHunter.name) {
        hunterDisplay.textContent = `Hunter: ${currentHunter.name} | Aura: ${currentHunter.totalAura || 0}`;
        hunterNameInput.value = currentHunter.name; // Preenche o input com o nome atual
        hunterNameInput.disabled = true; // Desabilita o input
        setHunterNameBtn.textContent = "Change Hunter"; // Muda o texto do botão
      } else {
        hunterDisplay.textContent = `Hunter: N/A | Aura: 0`;
        hunterNameInput.value = "";
        hunterNameInput.disabled = false;
        setHunterNameBtn.textContent = "Start Hunting";
      }
    }

    function isCleared(duckId) {
      return currentHunter && currentHunter.clearedDucks && currentHunter.clearedDucks[duckId];
    }

    function canAccessDuck(duck) {
      // Implemente sua lógica de acesso aqui, se houver tiers ou outras restrições
      return true;
    }

    function accessMessage(duck) {
      // Mensagem de erro se canAccessDuck retornar false
      return "You don't have access to this duck yet!";
    }

    // --- FUNÇÕES DO JOGO ---

    // NOVO: Função para configurar o contador regressivo do timer
    function setupGameTimerCountdown(endTime) {
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
      }

      gameTimerElement.style.display = 'flex'; // Mostra o timer
      gameTimerElement.classList.remove('ended'); // Remove o estilo de "terminado"

      gameTimerInterval = setInterval(() => {
        const now = Date.now();
        const timeLeft = endTime - now;

        if (timeLeft <= 0) {
          clearInterval(gameTimerInterval);
          gameTimerInterval = null;
          gameTimerElement.textContent = "Time: 00:00";
          gameTimerElement.classList.add('ended');
          // Se o tempo acabar, e o jogo ainda não foi marcado como terminado no Firebase, termina.
          // Isso evita chamadas repetidas se já foi terminado por outro cliente.
          gameStatusRef.once('value', (snapshot) => {
            const status = snapshot.val();
            if (!status || !status.isGameEnded) {
              gameStatusRef.update({ isGameEnded: true }); // Marca o jogo como terminado no Firebase
            }
          });
          return;
        }

        const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

        gameTimerElement.textContent = `Time: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }, 1000);
    }

    // NOVO: Função para encerrar o jogo (localmente)
    function endGame() {
      gameEnded = true;
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
      gameTimerElement.textContent = "Time: 00:00";
      gameTimerElement.classList.add('ended');
      renderDucks(); // Renderiza os patos novamente para mostrar o estado bloqueado
      displayScores(); // Mostra o placar
      scoreboardOverlay.style.display = 'flex'; // Exibe o overlay do placar
    }

    // NOVO: Função para resetar o estado local do jogo
    function resetGameLocalState() {
      gameEnded = false;
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
      gameTimerElement.style.display = 'none'; // Esconde o timer
      gameTimerElement.classList.remove('ended');
      scoreboardOverlay.style.display = 'none'; // Esconde o placar
      renderDucks(); // Renderiza os patos para o estado normal
    }

    // NOVO: Função para resetar o jogo no Firebase (apenas professor)
    async function resetGame() {
      const teacherInput = prompt("Teacher password to reset the entire game:");
      if (teacherInput === null) return;
      if (teacherInput !== TEACHER_PASSWORD) {
        alert("Incorrect teacher password!");
        return;
      }
      if (!confirm("Are you sure you want to reset the entire game for everyone? This cannot be undone.")) {
        return;
      }

      await gameStatusRef.set({ isGameEnded: false, endTime: null }); // Reseta o status do jogo (incluindo endTime)
      await playersRef.set(null);    // Reseta os dados dos jogadores

      // Resetar o localStorage de todos os alunos (opcional, mas recomendado para consistência)
      localStorage.removeItem(ALL_STUDENTS_KEY);
      allStudents = {}; // Limpa o objeto local
      currentHunter = null; // Limpa o caçador atual

      // O listener onValue vai detectar o `gameStatus` como null e chamar `resetGameLocalState()` em todos os clientes.
      // Apenas para garantir que o cliente que iniciou o reset também se atualize:
      resetGameLocalState();
      updateHunterDisplay(); // Garante que o display do caçador seja atualizado
      alert("Game reset for everyone!");
    }

    // Função para mostrar o pódio sincronizado com todos os alunos
    function displayScores() {
      // Buscamos todos os jogadores no banco de dados
      playersRef.on('value', ((snapshot) => {
        const data = snapshot.val();
        if (!data) {
          podiumContainer.innerHTML = '';
          allScoresList.innerHTML = '';
          return;
        }

        // Converte o objeto do banco em uma lista e ordena por Aura
        const sortedHunters = Object.values(data)
          .sort((a, b) => b.totalAura - a.totalAura);

        // Limpa os placares anteriores
        podiumContainer.innerHTML = '';
        allScoresList.innerHTML = '';

        // Constrói o Pódio (1º, 2º e 3º)
        // Ajustado para garantir que sempre haja 3 posições, mesmo que vazias
        const podiumRanks = ["second", "first", "third"];
        const podiumData = [sortedHunters[1], sortedHunters[0], sortedHunters[2]]; // Pega os 3 primeiros

        podiumData.forEach((hunter, index) => {
          const spot = document.createElement("div");
          spot.className = `podium-spot ${podiumRanks[index]}`;
          if (hunter) {
            spot.innerHTML = `
              <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
              <div class="podium-name">${hunter.name}</div>
              <div class="podium-aura">${hunter.totalAura} Aura</div>
            `;
          } else {
            spot.innerHTML = `
              <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
              <div class="podium-name">---</div>
              <div class="podium-aura">0 Aura</div>
            `;
          }
          podiumContainer.appendChild(spot);
        });

        // Constrói a lista completa de classificação
        sortedHunters.forEach(hunter => {
          const listItem = document.createElement("li");
          listItem.innerHTML = `
            <span>${hunter.name}</span>
            <span>${hunter.totalAura} Aura</span>
          `;
          allScoresList.appendChild(listItem);
        });
      }));
    }

    // NOVO: Função para marcar um pato como "cleared"
    async function markCleared(duck) {
      if (!currentHunter || !currentHunter.name) {
        alert("Please enter your hunter name first!");
        return;
      }

      // Atualiza o hunter localmente
      if (!currentHunter.clearedDucks) {
        currentHunter.clearedDucks = {};
      }
      currentHunter.clearedDucks[duck.id] = serverTimestamp; // Marca com timestamp do servidor
      currentHunter.totalAura = (currentHunter.totalAura || 0) + duck.aura;

      // Salva no Firebase
      await playersRef.child(currentHunter.name).set(currentHunter);

      // Atualiza o localStorage
      allStudents[currentHunter.name] = currentHunter;
      localStorage.setItem(ALL_STUDENTS_KEY, JSON.stringify(allStudents));

      updateHunterDisplay(); // Atualiza o display do hunter
      renderDucks(); // Renderiza os patos novamente para mostrar o pato como "cleared"
    }

    function renderDucks() {
      ducksGrid.innerHTML = ''; // Limpa o grid
      ducks.forEach(duck => {
        const card = buildCard(duck);
        ducksGrid.appendChild(card);
      });
    }

    function buildCard(duck) {
      const task = tasks[duck.id];

      const card = document.createElement("div");
      card.className = "card";

      const duckBtn = document.createElement("button");
      duckBtn.className = "duck-btn";
      duckBtn.setAttribute("aria-label", `Open Duck ${duck.id}`);

      // Add 'locked' class if game has ended
      if (gameEnded) {
        duckBtn.classList.add('locked');
      }

      duckBtn.innerHTML = `
        <div class="duck-cover ${isCleared(duck.id) ? 'cleared' : ''}">
          <img src="${duck.image}" alt="Duck ${duck.id}">
          ${isCleared(duck.id) ? '<div class="cleared-overlay">✅ HUNTED</div>' : ''}
        </div>
        <div style="display:flex; justify-content:space-between; width:100%; margin-top:4px;">
          <span class="tier-label">${duck.tier}</span>
          <span class="aura-label">+${duck.aura} aura</span>
        </div>
      `;

      const collapse = document.createElement("div");
      collapse.className = "collapse";

      const inner = document.createElement("div");
      inner.className = "collapse-inner";

      const lockDiv = document.createElement("div");
      lockDiv.innerHTML = `
        <div class="label-small">Password from QR</div>
        <div class="pw-row">
          <input type="password" class="pw-input" placeholder="Type the password from your duck">
          <button class="btn unlock-btn">Unlock</button>
        </div>
        <div class="error-msg"></div>
      `;

      const taskDiv = document.createElement("div");
      taskDiv.style.display = "none";

      let taskHTML = "";
      if (task) {
        taskHTML += `<div class="task-text">${task.text}</div>`;
        if (task.note) taskHTML += `<div class="task-note">${task.note}</div>`;
        if (task.gaps && task.gaps.length) {
          taskHTML += `<ul class="gap-list">${task.gaps.map(g => `<li>${g}</li>`).join("")}</ul>`;
          taskHTML += `<textarea class="answer-input" placeholder="${task.placeholder || "Write your answer here."}" value=""></textarea>`;
        } 
        else {
          taskHTML += `<textarea class="answer-input" placeholder="Write your answer here." value=""></textarea>`;
        }
      } else {
        taskHTML += `<div class="task-text">No mission yet. Ask your teacher.</div>`;
      }
      taskHTML += `<button class="btn approve-btn">Ask teacher to approve ✅</button>`;
      taskDiv.innerHTML = taskHTML;

      // --- CORREÇÃO DO TEXTAREA: garante placeholder e remove qualquer \n inicial ---
      const answerTextarea = taskDiv.querySelector(".answer-input");
      if (answerTextarea) {
        // Pega o placeholder que foi definido no HTML (se houver)
        const currentPlaceholder = answerTextarea.getAttribute("placeholder");

        // Limpa TODO e qualquer conteúdo interno (inclusive \n ou texto "value")
        answerTextarea.textContent = ""; // Garante que não há texto entre <textarea> e </textarea>
        answerTextarea.value = "";       // Garante que o atributo value está vazio

        // Se não havia placeholder no HTML, define um padrão
        if (!currentPlaceholder) {
          answerTextarea.setAttribute("placeholder", "Write your answer here.");
        }
        // Se por algum motivo o placeholder veio como textContent, move ele para o atributo
        else if (answerTextarea.textContent && !answerTextarea.getAttribute("placeholder")) {
          answerTextarea.setAttribute("placeholder", answerTextarea.textContent.trim());
          answerTextarea.textContent = ""; // Limpa novamente após mover
        }
      }

      const successDiv = document.createElement("div");
      successDiv.className = "success-area";
      successDiv.style.display = "none";
      successDiv.innerHTML = `
        <div class="success-main">✅ Approved!</div>
        <div class="success-sub">🔥 You just farmed +${duck.aura} aura!</div>
        <div class="success-timer">Locking again in <span class="timer-count">5</span>s…</div>
      `;

      inner.appendChild(lockDiv);
      inner.appendChild(taskDiv);
      inner.appendChild(successDiv);
      collapse.appendChild(inner);
      card.appendChild(duckBtn);
      card.appendChild(collapse);

      duckBtn.addEventListener("click", () => {
        if (gameEnded) { // If game has ended, prevent opening cards
          alert("The game has ended. You can view scores but not play.");
          return;
        }
        if (!currentHunter) {
          alert("Please enter your hunter name first to start playing!");
          return;
        }
        if (!canAccessDuck(duck)) {
          alert(accessMessage(duck));
          return;
        }
        const open = collapse.classList.contains("open");
        collapse.classList.toggle("open", !open);
      });

      const pwInput   = lockDiv.querySelector(".pw-input");
      const unlockBtn = lockDiv.querySelector(".unlock-btn");
      const errorMsg  = lockDiv.querySelector(".error-msg");

      function tryUnlock() {
        if (gameEnded) { return; } // Prevent unlocking if game ended
        if (!currentHunter) { alert("Please enter your hunter name first!"); return; }

        const val = (pwInput.value || "").trim();
        if (!val) { errorMsg.textContent = "Type the password from your duck QR."; return; }
        // NOVO: Verifica se a senha digitada é a senha do pato OU a senha mestra do professor
        if (val.toUpperCase() !== duck.password.toUpperCase() && val.toUpperCase() !== MASTER_TEACHER_PASSWORD.toUpperCase()) {
          errorMsg.textContent = "Wrong password. Check your QR code again, or ask your teacher for the master password.";
          return;
        }
        errorMsg.textContent = "";
        lockDiv.style.display = "none";
        taskDiv.style.display = "flex";
        taskDiv.style.flexDirection = "column";
        taskDiv.style.gap = "8px";
        const ta = taskDiv.querySelector(".answer-input");
        if (ta) {
          ta.value = "";      // você pode até remover esta linha se quiser manter qualquer texto antigo
          ta.focus();
          ta.setSelectionRange(0,0);
        }
      }

      unlockBtn.addEventListener("click", tryUnlock);
      pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

      const approveBtn = taskDiv.querySelector(".approve-btn");
      if (approveBtn) {
        approveBtn.addEventListener("click", async () => { // Adicionado 'async' aqui
          if (gameEnded) { return; } // Prevent approving if game ended
          const teacherInput = prompt("Teacher password:"); // Abre uma caixa para digitar a senha
          if (teacherInput === null) { // Se o professor clicou em "Cancelar" no prompt
            return; // Não faz nada e sai da função
          }
          if (teacherInput !== TEACHER_PASSWORD) { // Se a senha digitada for diferente da senha definida
            alert("Incorrect teacher password!"); // Mostra um alerta de senha incorreta
            return; // Não faz nada e sai da função
          }
          await markCleared(duck); // Usar await aqui para garantir que o Firebase seja atualizado antes de renderizar

          taskDiv.style.display = "none";
          successDiv.style.display = "flex";
          successDiv.style.flexDirection = "column";
          successDiv.style.gap = "4px";

          const timerSpan = successDiv.querySelector(".timer-count");
          let t = 5;
          timerSpan.textContent = t;
          const iv = setInterval(() => {
            t--;
            timerSpan.textContent = t;
            if (t <= 0) {
              clearInterval(iv);
              successDiv.style.display = "none";
              lockDiv.style.display    = "block";
              taskDiv.style.display    = "none";
              pwInput.value = "";
              collapse.classList.remove("open");
              renderDucks();
            }
          }, 1000);
        });
      }

      return card;
    }
  </script>
</body>
</html>
