<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duck Hunt - Would Aura Farm</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    @font-face {
      font-family: 'RubberDuck';
      src: url('rubber-duck.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --accent: #22c55e;
      --error: #dc2626;
      --text: #1f2933;
      --muted: #4b5563;
      --border: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* Degradê do branco (topo) para o amarelo (base) */
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #fef9c3 30%,
        #fde68a 70%,
        #facc15 100%
      );
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centraliza o conteúdo horizontalmente */
      /* Removido justify-content: center; para que o header fique no topo */
    }

    header {
      text-align: center;
      padding: 50px; /* Padding geral */
      margin-top: 50px; /* Adiciona um espaço do topo da página */
      margin-bottom: 20px; /* Espaço entre o header e o conteúdo abaixo */
    }

    .game-logo {
      width: 150px;
      height: auto;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    }

    .game-title {
      font-family: 'RubberDuck', regular;
      font-size: 8.5rem;
      letter-spacing: 0.08em;
      color: #3333cc; /* Cor azul sólida */
      /* Removido -webkit-text-stroke e text-stroke */
      /* Removido text-shadow */
      margin-bottom: 10px;
      white-space: nowrap;
      text-transform: capitalize; /* Apenas a primeira letra de cada palavra em maiúscula */
    } 

    .subtitle {
      font-size: 1rem;
      color: #374151;
      margin-top: 8px;
    }

    .grid {
      width: 100%;
      max-width: 1240px;
      padding: 16px 16px 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* CARD */
    .card {
      background: radial-gradient(circle at top, #fef9c3 0, #fef3c7 50%, #fde68a 100%);
      border-radius: 20px;
      border: 2px solid var(--border);
      box-shadow: 0 4px 0 rgba(234,179,8,0.85), 0 12px 28px rgba(180,83,9,0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .duck-btn {
      width: 100%;
      border: none;
      background: none;
      cursor: pointer;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform 0.15s;
    }

    .duck-btn:hover { transform: translateY(-3px) scale(1.02); }
    .duck-btn:active { transform: translateY(1px) scale(0.98); }
    .duck-btn.locked { cursor: not-allowed; opacity: 0.7; } /* Style for locked cards */


    .duck-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(120,53,15,0.35);
      background: #fde68a;
    }

    .duck-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.2) contrast(1.05);
      transform: scale(1.02);
    }

    .duck-cover.cleared {
      filter: grayscale(0.5);
    }

    .cleared-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(34, 197, 94, 0.7);
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      border-radius: 16px;
    }

    .tier-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #92400e;
      background: rgba(253,224,71,0.9);
      border: 1px solid rgba(234,179,8,0.8);
      padding: 2px 8px;
      border-radius: 999px;
      align-self: flex-start;
      margin-left: 2px;
    }

    .aura-label {
      font-size: 0.72rem;
      color: #166534;
      font-weight: 600;
      align-self: flex-end;
      margin-right: 2px;
    }

    .collapse {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .collapse.open { max-height: 620px; }

    .collapse-inner {
      padding: 10px 14px 16px;
      border-top: 1px solid rgba(234,179,8,0.5);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label-small {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .pw-row {
      display: flex;
      gap: 6px;
    }

    input[type="password"],
    textarea {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #facc15;
      background: rgba(255,251,235,0.97);
      color: var(--text);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      outline: none;
    }

    textarea {
      flex: 1;
      border-radius: 10px;
      resize: vertical;
      min-height: 32px;      /* bem menor */
      padding: 6px 10px;     /* pouco padding vertical */
      line-height: 1.2;      /* linha compacta */
      vertical-align: top;
      text-align: left;

      border: 1px solid #facc15;
      background: rgba(255,251,235,0.97);
      color: var(--text);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      background: linear-gradient(to right, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 2px 0 rgba(21,128,61,0.8);
      white-space: nowrap;
      transition: filter 0.1s, transform 0.1s;
    }

    .btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .btn:active { filter: brightness(0.95); transform: translateY(1px); box-shadow: none; }

    .error-msg {
      font-size: 0.7rem;
      color: var(--error);
      min-height: 14px;
    }

    .task-text {
      font-size: 0.8rem;
      line-height: 1.45;
      color: #1f2933;
    }

    .task-note {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
    }

    .gap-list {
      font-size: 0.75rem;
      color: #374151;
      margin-left: 14px;
    }
    .gap-list li { margin-bottom: 2px; }

    .success-area {
      text-align: center;
      padding: 4px 0 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .success-main { font-size: 1rem; font-weight: 700; color: #166534; }
    .success-sub  { font-size: 0.82rem; color: #b45309; font-weight: 600; }
    .success-timer{ font-size: 0.68rem; color: var(--muted); }

    footer {
      font-size: 0.72rem;
      color: #4b5563;
      text-align: center;
      padding-bottom: 16px;
    }

    /* Hunter Selection UI */
    .hunter-selection {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex-wrap: wrap;
      justify-content: center;
    }

    .current-hunter-info {
      font-weight: bold;
      color: var(--text);
      font-size: 1.1rem;
      margin-right: 15px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #hunterNameInput {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      flex-grow: 1;
      max-width: 250px;
    }

    #selectHunterBtn, #resetProgressBtn, #endGameBtn {
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background-color: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    #selectHunterBtn:hover { background-color: #16a34a; }
    #resetProgressBtn { background-color: #dc2626; margin-left: 10px; }
    #resetProgressBtn:hover { background-color: #b91c1c; }
    #endGameBtn { background-color: #f97316; margin-left: 10px; } /* Orange for End Game */
    #endGameBtn:hover { background-color: #ea580c; }


    /* Game Timer Display */
    .game-timer {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text);
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .game-timer.critical {
      color: var(--error);
    }

    /* Scoreboard */
    #scoreboard {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      margin-top: 30px;
      width: 90%;
      max-width: 800px;
      text-align: center;
      display: none; /* Esconde o scoreboard por padrão */
      flex-direction: column;
      gap: 20px;
    }

    #scoreboard h2 {
      font-family: 'RubberDuck', regular;
      font-size: 3rem;
      color: #3333cc;
      margin-bottom: 15px;
    }

    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 15px;
      margin-bottom: 25px;
    }

    .podium-spot {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #fef3c7;
      border-radius: 10px;
      padding: 10px 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      min-width: 120px;
    }

    .podium-spot.first {
      height: 180px;
      transform: translateY(-20px);
      background-color: #fde68a;
      border: 2px solid #facc15;
    }
    .podium-spot.second {
      height: 140px;
      background-color: #fffbeb;
      border: 2px solid #fcd34d;
    }
    .podium-spot.third {
      height: 100px;
      background-color: #fff7ed;
      border: 2px solid #fed7aa;
    }

    .podium-rank {
      font-size: 2.5rem;
      margin-bottom: 5px;
    }
    .podium-spot.first .podium-rank { font-size: 3.5rem; }

    .podium-name {
      font-weight: bold;
      font-size: 1.1rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .podium-aura {
      font-size: 0.9rem;
      color: #166534;
      font-weight: 600;
    }

    .all-scores {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      list-style: none;
      padding: 0;
    }

    .all-scores li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      font-size: 1rem;
      color: var(--text);
    }
    .all-scores li:last-child { border-bottom: none; }
    .all-scores li span:first-child { font-weight: 500; }
    .all-scores li span:last-child { font-weight: bold; color: #166534; }

    @media (max-width: 768px) {
      .game-title { font-size: 5rem; }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .podium-spot { min-width: 90px; padding: 8px 10px; }
      .podium-spot.first { height: 150px; }
      .podium-spot.second { height: 110px; }
      .podium-spot.third { height: 80px; }
      .podium-rank { font-size: 2rem; }
      .podium-spot.first .podium-rank { font-size: 3rem; }
      .podium-name { font-size: 0.9rem; }
      .podium-aura { font-size: 0.8rem; }
    }

    @media (max-width: 480px) {
      .game-title { font-size: 3.5rem; }
      .grid { grid-template-columns: 1fr; }
      .hunter-selection { flex-direction: column; }
      .current-hunter-info { margin-right: 0; margin-bottom: 10px; }
      #hunterNameInput { max-width: 100%; }
      #selectHunterBtn, #resetProgressBtn, #endGameBtn { width: 100%; margin-left: 0; margin-top: 10px; }
      .podium { flex-direction: column; align-items: center; }
      .podium-spot { width: 80%; max-width: 200px; }
      .podium-spot.first { transform: translateY(0); }
    }
  </style>

    // --- LOCAL STORAGE FUNCTIONS ---
    function saveCurrentHunter() {
      localStorage.setItem(CURRENT_HUNTER_KEY, JSON.stringify(currentHunter));
    }

    function loadCurrentHunter() {
      const storedHunter = localStorage.getItem(CURRENT_HUNTER_KEY);
      if (storedHunter) {
        currentHunter = JSON.parse(storedHunter);
      }
    }

    // --- GAME LOGIC FUNCTIONS ---

    function updateHunterDisplay() {
      if (!currentHunter) {
        hunterDisplay.textContent = "Hunter: None selected | Aura: 0";
        return;
      }
      // Corrigido para exibir apenas o nome e a aura
      hunterDisplay.textContent = `Hunter: ${currentHunter.name} | Aura: ${currentHunter.totalAura || 0}`;
    }

    function isCleared(duckId) {
      return currentHunter && currentHunter.clearedDucks && currentHunter.clearedDucks[duckId];
    }

    function canAccessDuck(duck) {

      return true; // Por enquanto, todos os patos são acessíveis
    }

    function accessMessage(duck) {
      return `You cannot access this ${duck.tier} duck yet.`;
    }

    async function markCleared(duck) {
      if (!currentHunter) return;

      // Atualiza localmente
      if (!currentHunter.clearedDucks) {
        currentHunter.clearedDucks = {};
      }
      currentHunter.clearedDucks[duck.id] = {
        timestamp: Date.now(),
        aura: duck.aura
      };
      currentHunter.totalAura = (currentHunter.totalAura || 0) + duck.aura;
      saveCurrentHunter();
      updateHunterDisplay();

      // Atualiza no Firebase
      const hunterRef = playersRef.child(currentHunter.name);
      await hunterRef.update({
        clearedDucks: currentHunter.clearedDucks,
        totalAura: currentHunter.totalAura,
        lastLogin: serverTimestamp // Atualiza o lastLogin para manter o jogador "ativo"
      });

      renderDucks(); // Renderiza novamente para atualizar o estado visual dos patos
    }

    function renderDucks() {
      gridElement.innerHTML = "";
      ducks.forEach(duck => {
        gridElement.appendChild(buildCard(duck));
      });
    }

    function resetGameLocalState() {
      gameEnded = false;
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
      gameTimerElement.textContent = "Time Left: --:--";
      gameTimerElement.classList.remove('critical');
      gameTimerElement.style.display = 'none';
      gridElement.style.display = 'grid';
      scoreboard.style.display = 'none';
      renderDucks(); // Renderiza novamente para garantir que os patos não estejam bloqueados
    }

    async function resetGame() {
      const teacherInput = prompt("Teacher password to reset ALL game progress:");
      if (teacherInput === null) return;
      if (teacherInput !== TEACHER_PASSWORD) {
        alert("Incorrect teacher password!");
        return;
      }
      if (!confirm("Are you sure you want to reset ALL game progress for ALL players? This cannot be undone!")) {
        return;
      }

      // Limpa o banco de dados para uma nova partida
      await gameStatusRef.set({ endTime: null, isGameEnded: false }); // Reseta o status do jogo (incluindo endTime e isGameEnded)
      await playersRef.set(null);    // Reseta os dados dos jogadores

      // Limpa o estado local
      currentHunter = null;
      localStorage.removeItem(CURRENT_HUNTER_KEY);
      resetGameLocalState();
      updateHunterDisplay();
      alert("All game progress has been reset!");
    }

    function endGame() {
      gameEnded = true;
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
      gameTimerElement.textContent = "Time Left: 00:00";
      gameTimerElement.classList.add('critical'); // Marca como crítico (tempo esgotado)
      gridElement.style.display = 'none';
      scoreboard.style.display = 'flex';
      displayScores();
      renderDucks(); // Renderiza novamente para bloquear os patos
    }

    let countdownTimeout = null; // Variável para armazenar o timeout do countdown

    function setupGameTimerCountdown(endTime) {
      // Limpa qualquer countdown anterior para evitar múltiplos timers
      if (countdownTimeout) {
        clearTimeout(countdownTimeout);
        countdownTimeout = null;
      }
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }

      gameTimerElement.style.display = 'flex'; // Mostra o timer

      const updateTimer = () => {
        const now = Date.now();
        const timeLeftMs = endTime - now;

        if (timeLeftMs <= 0) {
          clearInterval(gameTimerInterval);
          gameTimerInterval = null;
          gameTimerElement.textContent = "Time Left: 00:00";
          gameTimerElement.classList.add('critical');
          if (!gameEnded) { // Se o jogo não terminou ainda, encerra
            endGame();
          }
          return;
        }

        const totalSeconds = Math.floor(timeLeftMs / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;

        const formattedMinutes = String(minutes).padStart(2, '0');
        const formattedSeconds = String(seconds).padStart(2, '0');

        gameTimerElement.textContent = `Time Left: ${formattedMinutes}:${formattedSeconds}`;

        if (totalSeconds <= 60) { // Último minuto em vermelho
          gameTimerElement.classList.add('critical');
        } else {
          gameTimerElement.classList.remove('critical');
        }
      };

      // Atualiza imediatamente e depois a cada segundo
      updateTimer();
      gameTimerInterval = setInterval(updateTimer, 1000);
    }

    async function displayScores() {
      const allPlayersSnapshot = await playersRef.once('value');
      const allPlayersData = allPlayersSnapshot.val() || {};

      const sortedHunters = Object.values(allPlayersData)
        .map(player => ({
          name: player.name,
          totalAura: player.totalAura || 0
        }))
        .sort((a, b) => b.totalAura - a.totalAura);

      const podiumContainer = scoreboard.querySelector(".podium");
      const allScoresList = scoreboard.querySelector(".all-scores");

      podiumContainer.innerHTML = "";
      allScoresList.innerHTML = "";

      // Constrói o pódio
      const podiumRanks = ["second", "first", "third"];
      const podiumData = [sortedHunters[1], sortedHunters[0], sortedHunters[2]]; // Pega os 3 primeiros

      podiumData.forEach((hunter, index) => {
        const spot = document.createElement("div");
        spot.className = `podium-spot ${podiumRanks[index]}`;
        if (hunter) {
          spot.innerHTML = `
            <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
            <div class="podium-name">${hunter.name}</div>
            <div class="podium-aura">${hunter.totalAura} Aura</div>
          `;
        } else {
          spot.innerHTML = `
            <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
            <div class="podium-name">---</div>
            <div class="podium-aura">0 Aura</div>
          `;
        }
        podiumContainer.appendChild(spot);
      });

      // Constrói a lista completa de classificação
      sortedHunters.forEach(hunter => {
        const listItem = document.createElement("li");
        listItem.innerHTML = `
          <span>${hunter.name}</span>
          <span>${hunter.totalAura} Aura</span>
        `;
        allScoresList.appendChild(listItem);
      });
    }

    // --- EVENT LISTENERS ---
    selectHunterBtn.addEventListener("click", async () => {
      const hunterName = hunterNameInput.value.trim();
      if (!hunterName) {
        alert("Please enter your hunter name!");
        return;
      }

      // Se o jogo já terminou, não permite iniciar um novo hunter
      if (gameEnded) {
        alert("The game has ended. You can view scores but not play.");
        return;;
      }

      // Carrega ou cria o hunter no Firebase
      const hunterSnapshot = await playersRef.child(hunterName).once('value');
      let hunterData = hunterSnapshot.val();

      if (!hunterData) {
        // Novo hunter
        hunterData = {
          name: hunterName,
          totalAura: 0,
          clearedDucks: {},
          lastLogin: serverTimestamp
        };
        await playersRef.child(hunterName).set(hunterData);
      } else {
        // Hunter existente, atualiza lastLogin
        await playersRef.child(hunterName).update({ lastLogin: serverTimestamp });
      }

      currentHunter = hunterData;
      saveCurrentHunter();
      updateHunterDisplay();
      renderDucks();

      // Inicia o timer se ainda não estiver ativo
      const statusSnapshot = await gameStatusRef.once('value');
      const gameStatus = statusSnapshot.val();

      if (!gameStatus || !gameStatus.endTime) {
        // Se não há timer, inicia um novo (ex: 15 minutos)
        const newEndTime = Date.now() + (15 * 60 * 1000); // 15 minutos a partir de agora
        await gameStatusRef.update({ endTime: newEndTime, isGameEnded: false });
      }
      // O listener gameStatusRef.on('value') vai pegar o endTime e iniciar o countdown
    });

    resetProgressBtn.addEventListener("click", resetGame);

    endGameBtn.addEventListener("click", async () => {
      // Se o jogo já terminou globalmente (sinalizado pelo Firebase),
      // apenas mostra o placar localmente e sai.
      if (gameEnded) {
        scoreboard.style.display = 'flex';
        gridElement.style.display = 'none';
        displayScores();
        return;
      }

      // Pergunta se é o professor
      const teacherInput = prompt("To end the game for everyone, enter the teacher password. Otherwise, click Cancel to just view your local scoreboard.");

      if (teacherInput === null) { // Se o usuário clicou em "Cancelar"
        // Comportamento para jogador: apenas mostra o placar localmente
        const confirmLocalEnd = confirm("You chose not to end the game for everyone. Do you want to view the scoreboard locally? The game will continue for other players until the teacher ends it or the timer runs out.");
        if (confirmLocalEnd) {
          scoreboard.style.display = 'flex';
          gridElement.style.display = 'none';
          displayScores();
        }
        return; // Sai da função
      }

      // Se o usuário digitou algo, verifica se é a senha do professor
      if (teacherInput !== TEACHER_PASSWORD) {
        alert("Incorrect teacher password! The game will not be ended for everyone.");
        // Comportamento para jogador: apenas mostra o placar localmente
        const confirmLocalEnd = confirm("Incorrect password. Do you want to view the scoreboard locally? The game will continue for other players until the teacher ends it or the timer runs out.");
        if (confirmLocalEnd) {
          scoreboard.style.display = 'flex';
          gridElement.style.display = 'none';
          displayScores();
        }
        return; // Sai da função
      }

      // Se a senha do professor estiver correta, pergunta se quer encerrar o jogo globalmente
      const confirmGlobalEnd = confirm("Teacher password correct. Are you sure you want to end the game for ALL players? All ducks will be locked and scores displayed for everyone.");
      if (confirmGlobalEnd) {
        await gameStatusRef.update({ isGameEnded: true }); // Sinaliza no Firebase que o jogo terminou
        // A função endGame() será chamada pelo listener do Firebase em todos os clientes.
      }
    });

    // --- Listener Global para o Timer e Estado do Jogo no Firebase ---
    gameStatusRef.on('value', (snapshot) => {
      const gameStatus = snapshot.val();

      // Lógica para o timer
      if (gameStatus && gameStatus.endTime) {
        // Se o jogo não terminou e o timer não está ativo, configura o timer
        if (!gameTimerInterval && !gameEnded) {
          setupGameTimerCountdown(gameStatus.endTime);
        }
      } else {
        // Se gameStatus ou endTime for null, significa que o jogo foi resetado ou não começou
        if (gameTimerInterval) {
          clearInterval(gameTimerInterval);
          gameTimerInterval = null;
        }
        // Se o jogo não terminou oficialmente, reseta o estado local
        if (!gameEnded) {
          resetGameLocalState();
        }
      }

      // Lógica para o estado de "jogo terminado"
      if (gameStatus && gameStatus.isGameEnded) {
        console.log("DEBUG: isGameEnded é true no Firebase. Chamando endGame().");
        // Garante que endGame só seja chamado se o jogo ainda não terminou localmente
        if (!gameEnded) {
          endGame(); // Chama endGame para todos os clientes
        }
      } else if (gameEnded && (!gameStatus || !gameStatus.isGameEnded)) {
        // Se gameEnded é true localmente, mas não no Firebase, significa que o jogo foi resetado
        // ou o estado de "terminado" foi removido pelo professor.
        console.log("DEBUG: isGameEnded é falso ou null no Firebase, mas gameEnded é true localmente. Resetando estado local.");
        resetGameLocalState(); // Reseta o estado local para permitir que o jogo recomece
      }
    });

    // --- Initial Setup ---
    loadCurrentHunter(); // Carrega o hunter ao iniciar
    renderDucks();
    updateHunterDisplay();
    gameTimerElement.style.display = 'none'; // Hide timer initially until game starts

    // Verifica o estado do jogo no Firebase ao carregar a página
    gameStatusRef.once('value').then(snapshot => {
      const gameStatus = snapshot.val();
      if (gameStatus && gameStatus.isGameEnded) {
        endGame(); // Se o jogo já terminou no Firebase, exibe o placar
      } else {
        resetGameLocalState(); // Garante que o estado local esteja limpo se o jogo não terminou
      }
    });


    function buildCard(duck) {
      const task = tasks[duck.id];

      const card = document.createElement("div");
      card.className = "card";

      const duckBtn = document.createElement("button");
      duckBtn.className = "duck-btn";
      duckBtn.setAttribute("aria-label", `Open Duck ${duck.id}`);

      // Add 'locked' class if game has ended
      if (gameEnded) {
        duckBtn.classList.add('locked');
      }

      duckBtn.innerHTML = `
        <div class="duck-cover ${isCleared(duck.id) ? 'cleared' : ''}">
          <img src="${duck.image}" alt="Duck ${duck.id}">
          ${isCleared(duck.id) ? '<div class="cleared-overlay">✅ HUNTED</div>' : ''}
        </div>
        <div style="display:flex; justify-content:space-between; width:100%; margin-top:4px;">
          <span class="tier-label">${duck.tier}</span>
          <span class="aura-label">+${duck.aura} aura</span>
        </div>
      `;

      const collapse = document.createElement("div");
      collapse.className = "collapse";

      const inner = document.createElement("div");
      inner.className = "collapse-inner";

      const lockDiv = document.createElement("div");
      lockDiv.innerHTML = `
        <div class="label-small">Password from QR</div>
        <div class="pw-row">
          <input type="password" class="pw-input" placeholder="Type the password from your duck">
          <button class="btn unlock-btn">Unlock</button>
        </div>
        <div class="error-msg"></div>
      `;

      const taskDiv = document.createElement("div");
      taskDiv.style.display = "none";

      let taskHTML = "";
      if (task) {
        taskHTML += `<div class="task-text">${task.text}</div>`;
        if (task.note) taskHTML += `<div class="task-note">${task.note}</div>`;
        if (task.gaps && task.gaps.length) {
          taskHTML += `<ul class="gap-list">${task.gaps.map(g => `<li>${g}</li>`).join("")}</ul>`;
          taskHTML += `<textarea class="answer-input" placeholder="${task.placeholder || "Write your answer here."}" value=""></textarea>`;
        } 
        else {
          taskHTML += `<textarea class="answer-input" placeholder="Write your answer here." value=""></textarea>`;
        }
      } else {
        taskHTML += `<div class="task-text">No mission yet. Ask your teacher.</div>`;
      }
      taskHTML += `<button class="btn approve-btn">Ask teacher to approve ✅</button>`;
      taskDiv.innerHTML = taskHTML;

      // --- CORREÇÃO DO TEXTAREA: garante placeholder e remove qualquer \n inicial ---
      const answerTextarea = taskDiv.querySelector(".answer-input");
      if (answerTextarea) {
        // Pega o placeholder que foi definido no HTML (se houver)
        const currentPlaceholder = answerTextarea.getAttribute("placeholder");

        // Limpa TODO e qualquer conteúdo interno (inclusive \n ou texto "value")
        answerTextarea.textContent = ""; // Garante que não há texto entre <textarea> e </textarea>
        answerTextarea.value = "";       // Garante que o atributo value está vazio

        // Se não havia placeholder no HTML, define um padrão
        if (!currentPlaceholder) {
          answerTextarea.setAttribute("placeholder", "Write your answer here.");
        }
        // Se por algum motivo o placeholder veio como textContent, move ele para o atributo
        else if (answerTextarea.textContent && !answerTextarea.getAttribute("placeholder")) {
          answerTextarea.setAttribute("placeholder", answerTextarea.textContent.trim());
          answerTextarea.textContent = ""; // Limpa novamente após mover
        }
      }

      const successDiv = document.createElement("div");
      successDiv.className = "success-area";
      successDiv.style.display = "none";
      successDiv.innerHTML = `
        <div class="success-main">✅ Approved!</div>
        <div class="success-sub">🔥 You just farmed +${duck.aura} aura!</div>
        <div class="success-timer">Locking again in <span class="timer-count">5</span>s…</div>
      `;

      inner.appendChild(lockDiv);
      inner.appendChild(taskDiv);
      inner.appendChild(successDiv);
      collapse.appendChild(inner);
      card.appendChild(duckBtn);
      card.appendChild(collapse);

      duckBtn.addEventListener("click", () => {
        if (gameEnded) { // If game has ended, prevent opening cards
          alert("The game has ended. You can view scores but not play.");
          return;
        }
        if (!currentHunter) {
          alert("Please enter your hunter name first to start playing!");
          return;
        }
        if (!canAccessDuck(duck)) {
          alert(accessMessage(duck));
          return;
        }
        const open = collapse.classList.contains("open");
        collapse.classList.toggle("open", !open);
      });

      const pwInput   = lockDiv.querySelector(".pw-input");
      const unlockBtn = lockDiv.querySelector(".unlock-btn");
      const errorMsg  = lockDiv.querySelector(".error-msg");

      function tryUnlock() {
        if (gameEnded) { return; } // Prevent unlocking if game ended
        if (!currentHunter) { alert("Please enter your hunter name first!"); return; }

        const val = (pwInput.value || "").trim();
        if (!val) { errorMsg.textContent = "Type the password from your duck QR."; return; }
        // NOVO: Verifica se a senha digitada é a senha do pato OU a senha mestra do professor
        if (val.toUpperCase() !== duck.password.toUpperCase() && val.toUpperCase() !== MASTER_TEACHER_PASSWORD.toUpperCase()) {
          errorMsg.textContent = "Wrong password. Check your QR code again, or ask your teacher for the master password.";
          return;
        }
        errorMsg.textContent = "";
        lockDiv.style.display = "none";
        taskDiv.style.display = "flex";
        taskDiv.style.flexDirection = "column";
        taskDiv.style.gap = "8px";
        const ta = taskDiv.querySelector(".answer-input");
        if (ta) {
          ta.value = "";      // você pode até remover esta linha se quiser manter qualquer texto antigo
          ta.focus();
          ta.setSelectionRange(0,0);
        }
      }

      unlockBtn.addEventListener("click", tryUnlock);
      pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

      const approveBtn = taskDiv.querySelector(".approve-btn");
      if (approveBtn) {
        approveBtn.addEventListener("click", async () => { // Adicionado 'async' aqui
          if (gameEnded) { return; } // Prevent approving if game ended
          const teacherInput = prompt("Teacher password:"); // Abre uma caixa para digitar a senha
          if (teacherInput === null) { // Se o professor clicou em "Cancelar" no prompt
            return; // Não faz nada e sai da função
          }
          if (teacherInput !== TEACHER_PASSWORD) { // Se a senha digitada for diferente da senha definida
            alert("Incorrect teacher password!"); // Mostra um alerta de senha incorreta
            return; // Não faz nada e sai da função
          }
          await markCleared(duck); // Usar await aqui para garantir que o Firebase seja atualizado antes de renderizar

          taskDiv.style.display = "none";
          successDiv.style.display = "flex";
          successDiv.style.flexDirection = "column";
          successDiv.style.gap = "4px";

          const timerSpan = successDiv.querySelector(".timer-count");
          let t = 5;
          timerSpan.textContent = t;
          const iv = setInterval(() => {
            t--;
            timerSpan.textContent = t;
            if (t <= 0) {
              clearInterval(iv);
              successDiv.style.display = "none";
              lockDiv.style.display    = "block";
              taskDiv.style.display    = "none";
              pwInput.value = "";
              collapse.classList.remove("open");
              renderDucks();
            }
          }, 1000);
        });
      }

      return card;
    }
  </script>
</body>
</html>
