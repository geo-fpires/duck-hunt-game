  <style>
    @font-face {
      font-family: 'RubberDuck';
      src: url('rubber-duck.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --accent: #22c55e;
      --error: #dc2626;
      --text: #1f2933;
      --muted: #4b5563;
      --border: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      /* Degradê do branco (topo) para o amarelo (base) */
      background: linear-gradient(
        to bottom,
        #ffffff 0%,
        #fef9c3 30%,
        #fde68a 70%,
        #facc15 100%
      );
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center; /* Centraliza o conteúdo horizontalmente */
      /* Removido justify-content: center; para que o header fique no topo */
    }

    header {
      text-align: center;
      padding: 50px; /* Padding geral */
      margin-top: 50px; /* Adiciona um espaço do topo da página */
      margin-bottom: 20px; /* Espaço entre o header e o conteúdo abaixo */
    }

    .game-logo {
      width: 150px;
      height: auto;
      margin-bottom: 15px;
      display: block;
      margin-left: auto;
      margin-right: auto;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    }

    .game-title {
      font-family: 'RubberDuck', regular;
      font-size: 8.5rem;
      letter-spacing: 0.08em;
      color: #3333cc; /* Cor azul sólida */
      /* Removido -webkit-text-stroke e text-stroke */
      /* Removido text-shadow */
      margin-bottom: 10px;
      white-space: nowrap;
      text-transform: capitalize; /* Apenas a primeira letra de cada palavra em maiúscula */
    } 

    .subtitle {
      font-size: 1rem;
      color: #374151;
      margin-top: 8px;
    }

    .grid {
      width: 100%;
      max-width: 1240px;
      padding: 16px 16px 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* CARD */
    .card {
      background: radial-gradient(circle at top, #fef9c3 0, #fef3c7 50%, #fde68a 100%);
      border-radius: 20px;
      border: 2px solid var(--border);
      box-shadow: 0 4px 0 rgba(234,179,8,0.85), 0 12px 28px rgba(180,83,9,0.35);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .duck-btn {
      width: 100%;
      border: none;
      background: none;
      cursor: pointer;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform 0.15s;
    }

    .duck-btn:hover { transform: translateY(-3px) scale(1.02); }
    .duck-btn:active { transform: translateY(1px) scale(0.98); }
    .duck-btn.locked { cursor: not-allowed; opacity: 0.7; } /* Style for locked cards */


    .duck-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(120,53,15,0.35);
      background: #fde68a;
    }

    .duck-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.2) contrast(1.05);
      transform: scale(1.02);
    }

    .duck-cover.cleared {
      filter: grayscale(0.5);
    }

    .cleared-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(34, 197, 94, 0.7);
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      border-radius: 16px;
    }

    .tier-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #92400e;
      background: rgba(253,224,71,0.9);
      border: 1px solid rgba(234,179,8,0.8);
      padding: 2px 8px;
      border-radius: 999px;
      align-self: flex-start;
      margin-left: 2px;
    }

    .aura-label {
      font-size: 0.72rem;
      color: #166534;
      font-weight: 600;
      align-self: flex-end;
      margin-right: 2px;
    }

    .collapse {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }
    .collapse.open { max-height: 620px; }

    .collapse-inner {
      padding: 10px 14px 16px;
      border-top: 1px solid rgba(234,179,8,0.5);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label-small {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .pw-row {
      display: flex;
      gap: 6px;
    }

    input[type="password"],
    textarea {
      flex: 1;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #facc15;
      background: rgba(255,251,235,0.97);
      color: var(--text);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      outline: none;
    }

    textarea {
      flex: 1;
      border-radius: 10px;
      resize: vertical;
      min-height: 32px;      /* bem menor */
      padding: 6px 10px;     /* pouco padding vertical */
      line-height: 1.2;      /* linha compacta */
      vertical-align: top;
      text-align: left;

      border: 1px solid #facc15;
      background: rgba(255,251,235,0.97);
      color: var(--text);
      font-size: 0.8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
    }

    .btn {
      border-radius: 999px;
      border: none;
      padding: 6px 14px;
      font-size: 0.74rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      background: linear-gradient(to right, #22c55e, #16a34a);
      color: #022c22;
      box-shadow: 0 2px 0 rgba(21,128,61,0.8);
      white-space: nowrap;
      transition: filter 0.1s, transform 0.1s;
    }

    .btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
    .btn:active { filter: brightness(0.95); transform: translateY(1px); box-shadow: none; }

    .error-msg {
      font-size: 0.7rem;
      color: var(--error);
      min-height: 14px;
    }

    .task-text {
      font-size: 0.8rem;
      line-height: 1.45;
      color: #1f2933;
    }

    .task-note {
      font-size: 0.7rem;
      color: var(--muted);
      font-style: italic;
    }

    .gap-list {
      font-size: 0.75rem;
      color: #374151;
      margin-left: 14px;
    }
    .gap-list li { margin-bottom: 2px; }

    .success-area {
      text-align: center;
      padding: 4px 0 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .success-main { font-size: 1rem; font-weight: 700; color: #166534; }
    .success-sub  { font-size: 0.82rem; color: #b45309; font-weight: 600; }
    .success-timer{ font-size: 0.68rem; color: var(--muted); }

    footer {
      font-size: 0.72rem;
      color: #4b5563;
      text-align: center;
      padding-bottom: 16px;
    }

    /* Hunter Selection UI */
    .hunter-selection {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex-wrap: wrap;
      justify-content: center;
    }

    .current-hunter-info {
      font-weight: bold;
      color: var(--text);
      font-size: 1.1rem;
      margin-right: 15px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #hunterNameInput {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
      flex-grow: 1;
      max-width: 250px;
    }

    #selectHunterBtn, #resetProgressBtn, #endGameBtn, #resetFirebaseTimerBtn { /* Adicionado #resetFirebaseTimerBtn */
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background-color: var(--accent);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    #selectHunterBtn:hover { background-color: #16a34a; }
    #resetProgressBtn { background-color: #dc2626; margin-left: 10px; }
    #resetProgressBtn:hover { background-color: #b91c1c; }
    #endGameBtn { background-color: #f97316; margin-left: 10px; } /* Orange for End Game */
    #endGameBtn:hover { background-color: #ea580c; }
    #resetFirebaseTimerBtn { background-color: #6b7280; margin-left: 10px; } /* Gray for Reset Timer */
    #resetFirebaseTimerBtn:hover { background-color: #4b5563; }


    /* Game Timer Display */
    .game-timer {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text);
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .game-timer.critical {
      color: var(--error);
    }

    /* Scoreboard */
    #scoreboard {
      background-color: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      margin-top: 30px;
      width: 90%;
      max-width: 800px;
      text-align: center;
      display: none; /* Hidden by default */
      flex-direction: column;
      gap: 20px;
    }

    #scoreboard h2 {
      font-size: 2.5rem;
      color: #f97316;
      margin-bottom: 15px;
      font-family: 'RubberDuck', system-ui;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
    }

    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      margin-bottom: 30px;
    }

    .podium-spot {
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #fef9c3;
      border-radius: 10px;
      padding: 15px 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      min-width: 120px;
    }

    .podium-spot.first { height: 180px; background-color: #ffd700; } /* Gold */
    .podium-spot.second { height: 140px; background-color: #c0c0c0; } /* Silver */
    .podium-spot.third { height: 100px; background-color: #cd7f32; } /* Bronze */

    .podium-rank { font-size: 2.5rem; font-weight: bold; color: #333; margin-bottom: 5px; }
    .podium-name { font-size: 1.2rem; font-weight: bold; color: var(--text); }
    .podium-aura { font-size: 1rem; color: #166534; margin-top: 5px; }
    .podium-bonus { font-size: 0.8rem; color: #f97316; font-weight: bold; margin-top: 5px; }

    .all-scores-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #eee;
      padding-top: 20px;
    }

    .all-scores-list li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
      font-size: 1rem;
      color: var(--text);
    }
    .all-scores-list li:last-child { border-bottom: none; }
    .all-scores-list li span:first-child { font-weight: bold; }
    .all-scores-list li span:last-child { color: #166534; font-weight: bold; }


    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 520px) {
      .grid { grid-template-columns: repeat(1, 1fr); padding-inline: 10px; }
      .game-title {
        font-size: 3.5rem;
        white-space: normal;
      }
      header {
        padding: 20px;
        margin-top: 20px;
      }
      .hunter-selection {
        flex-direction: column;
        align-items: stretch;
      }
      .current-hunter-info {
        margin-right: 0;
        margin-bottom: 10px;
        text-align: center;
      }
      #hunterNameInput {
        max-width: none;
      }
      #resetProgressBtn, #endGameBtn, #resetFirebaseTimerBtn { /* Adicionado #resetFirebaseTimerBtn */
        margin-left: 0;
        margin-top: 10px;
      }
      .podium { flex-direction: column; align-items: center; }
      .podium-spot { width: 100%; max-width: 200px; }
      .podium-spot.first { height: auto; }
      .podium-spot.second { height: auto; }
      .podium-spot.third { height: auto; }
    }
  </style>

    17: { text: "ORAL MISSION: Create a short dialogue with a friend asking for FORMAL permission, and getting a negative answer.", note: "Present it to the teacher.", placeholder: "Leave blank and talk to the teacher" },
    18: { text: "Complete the idea: 'If I were an animal, I...'", note: "Use 'would' to describe what you would be or do.", placeholder: "Write your full sentence here" },
    19: { text: "Complete both spaces: '___ you open the door for me, please? I ___ do it because my hands are full.'", note: "Formal request + Negative present ability.", gaps: ["Could / can't", "Can / wouldn't", "Would / couldn't"], placeholder: "Type the two words" },
    20: { text: "🏆 FINAL BOSS DUCK! Tell your teacher a short story (3 sentences) about a past trip. Include something you COULD do there, something you COULDN'T do but you WOULD make during your trip.", note: "Oral or written. Teacher's choice!", placeholder: "Write your story or talk to the teacher" },
  };

  // --- GAME STATE & TIMER ---
  const GAME_DURATION_SECONDS = 25 * 60; // 25 minutes
  let gameTimerInterval;
  let timeLeft = GAME_DURATION_SECONDS;
  let gameEnded = false;

  // --- DOM Elements ---
  const gridElement = document.getElementById("grid");
  const gameTimerElement = document.getElementById("gameTimer");
  const timerDisplay = document.getElementById("timerDisplay");
  const scoreboard = document.getElementById("scoreboard");
  const podiumContainer = document.getElementById("podiumContainer");
  const allScoresList = document.getElementById("allScoresList");

  // --- Local Storage & Current Hunter ---
  let allStudents = JSON.parse(localStorage.getItem(ALL_STUDENTS_KEY)) || {};
  let currentHunter = JSON.parse(localStorage.getItem(CURRENT_HUNTER_KEY));

  function saveAllStudents() {
    localStorage.setItem(ALL_STUDENTS_KEY, JSON.stringify(allStudents));
  }

  function saveCurrentHunter() {
    localStorage.setItem(CURRENT_HUNTER_KEY, JSON.stringify(currentHunter));
  }

  async function setCurrentHunter(name) {
    if (currentHunter && currentHunter.name === name) {
      return; // Already selected
    }

    // Tenta carregar o hunter do Firebase
    const snapshot = await playersRef.child(name).once('value');
    let hunterData = snapshot.val();

    if (!hunterData) {
      // Se não existe no Firebase, cria um novo
      hunterData = {
        name: name,
        clearedDucks: {},
        totalAura: 0,
        lastLogin: serverTimestamp // Usa o timestamp do servidor
      };
      await playersRef.child(name).set(hunterData);
    } else {
      // Se existe, atualiza o lastLogin
      await playersRef.child(name).update({ lastLogin: serverTimestamp });
    }

    currentHunter = hunterData;
    saveCurrentHunter();
    updateHunterDisplay();
    renderDucks(); // Renderiza os patos com o estado do novo hunter
  }

  function isCleared(duckId) {
    return currentHunter && currentHunter.clearedDucks && currentHunter.clearedDucks[duckId];
  }

  async function markCleared(duck) {
    if (!currentHunter) return;

    // Atualiza no Firebase
    const updates = {};
    updates[`players/${currentHunter.name}/clearedDucks/${duck.id}`] = serverTimestamp;
    updates[`players/${currentHunter.name}/totalAura`] = currentHunter.totalAura + duck.aura;
    updates[`players/${currentHunter.name}/lastClearedDuck`] = duck.id;
    updates[`players/${currentHunter.name}/lastClearedTime`] = serverTimestamp;

    await db.ref().update(updates); // Atualiza múltiplos caminhos

    // Atualiza o estado local
    currentHunter.clearedDucks[duck.id] = true;
    currentHunter.totalAura += duck.aura;
    saveCurrentHunter();
    updateHunterDisplay();
    renderDucks(); // Re-renderiza para mostrar o pato como "cleared"
  }

  function resetGameLocalState() {
    currentHunter = null;
    localStorage.removeItem(CURRENT_HUNTER_KEY);
    gameEnded = false;
    if (gameTimerInterval) {
      clearInterval(gameTimerInterval);
      gameTimerInterval = null;
    }
    timeLeft = GAME_DURATION_SECONDS;
    timerDisplay.textContent = formatTime(timeLeft);
    gameTimerElement.classList.remove("critical");
    gameTimerElement.style.display = 'none';
    gridElement.style.display = 'grid';
    scoreboard.style.display = 'none';
    renderDucks();
    updateHunterDisplay();
  }

  function canAccessDuck(duck) {
    if (!currentHunter) return false;
    if (isCleared(duck.id)) return true; // Já liberado, pode acessar

    if (duck.id === 7) { // Bonus duck
      return currentHunter.totalAura >= 20;
    }
    if (duck.id === 20) { // Boss duck
      return currentHunter.totalAura >= 40;
    }
    return true;
  }

  function accessMessage(duck) {
    if (!currentHunter) {
      return "Please enter your hunter name first to start playing!";
    }
    if (duck.id === 7) {
      return `You need at least 20 aura to open the BONUS duck. You currently have ${currentHunter.totalAura} aura.`;
    }
    if (duck.id === 20) {
      return `You need at least 40 aura to open the BOSS duck. You currently have ${currentHunter.totalAura} aura.`;
    }
    return "";
  }

  // --- Hunter Selection UI ---

  const hunterNameInput = document.getElementById("hunterNameInput");
  const selectHunterBtn = document.getElementById("selectHunterBtn");
  const resetProgressBtn = document.getElementById("resetProgressBtn");
  const endGameBtn = document.getElementById("endGameBtn"); // Adicionado
  const resetFirebaseTimerBtn = document.getElementById("resetFirebaseTimerBtn"); // Adicionado
  const hunterNameDisplay = document.getElementById("hunterNameDisplay");
  const hunterAuraDisplay = document.getElementById("hunterAuraDisplay");

  function updateHunterDisplay() {
    if (currentHunter) {
      hunterNameDisplay.textContent = `Hunter: ${currentHunter.name}`;
      hunterAuraDisplay.textContent = `Aura: ${currentHunter.totalAura}`;
    } else {
      hunterNameDisplay.textContent = "Hunter: None selected";
      hunterAuraDisplay.textContent = "Aura: 0";
    }
  }

  selectHunterBtn.addEventListener("click", async () => {
    const name = hunterNameInput.value.trim();
    if (name) {
      await setCurrentHunter(name); // Use await aqui
      if (!gameTimerInterval && !gameEnded) { // Start timer only if not already running and game not ended
        // Tenta pegar o endTime atual do Firebase
        const snapshot = await gameStatusRef.child('endTime').once('value');
        let endTime = snapshot.val();

        if (!endTime) {
          // Se não existe (este é o primeiro jogador a iniciar), define o endTime no Firebase
          endTime = Date.now() + (GAME_DURATION_SECONDS * 1000);
          await gameStatusRef.child('endTime').set(endTime); // Usa await para garantir que o set termine
          // O listener onValue vai pegar essa mudança e chamar setupGameTimerCountdown
        }
        // Se já existe, o listener onValue já vai ter iniciado o timer
      }
    } else {
      alert("Please enter your hunter name!");
    }
  });

  resetProgressBtn.addEventListener("click", () => {
    // Chama diretamente a função do professor que reseta o Firebase
    resetGame();
  });

  endGameBtn.addEventListener("click", async () => {
    // Pede a senha do professor
    const teacherInput = prompt("Teacher password to end the game:");

    // Se clicar em cancelar, não faz nada
    if (teacherInput === null) return; 

    // Verifica se a senha está correta
    if (teacherInput !== TEACHER_PASSWORD) {
      alert("Incorrect teacher password!");
      return;
    }

    // Confirmação final e atualização no Firebase
    if (confirm("Are you sure you want to end the game now? All ducks will be locked and scores displayed.")) {
      await gameStatusRef.update({ isEnded: true });
    }
  });

  // Listener para o botão de resetar o timer do Firebase
  if (resetFirebaseTimerBtn) { // Verifica se o botão existe no HTML
    resetFirebaseTimerBtn.addEventListener("click", resetFirebaseTimerOnly);
  }

  // --- Listener Global para o Timer do Firebase ---
  gameStatusRef.on('value', (snapshot) => {
    const gameStatus = snapshot.val();
    if (gameStatus) {
      if (gameStatus.isEnded) {
        // Se o professor encerrou o jogo, finaliza para todos
        if (!gameEnded) endGame();
      } else if (gameStatus.endTime) {
        // Se o jogo está rolando, configura o timer
        if (!gameTimerInterval && !gameEnded) {
          setupGameTimerCountdown(gameStatus.endTime);
        }
      }
    } else {
      // Se gameStatus for null (jogo resetado)
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
      resetGameLocalState();
    }
  });

  function renderDucks() {
    gridElement.innerHTML = '';
    duckConfigs.forEach(cfg => gridElement.appendChild(buildCard(cfg)));
  }

  // --- Game Timer Functions ---

  function formatTime(seconds) {
    const minutes = Math.floor(seconds / 60);
    const remainingSeconds = seconds % 60;
    return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
  }

  // Esta função agora APENAS configura o setInterval para contar a partir de um endTime
  // Ela NÃO define o endTime no Firebase. Isso será feito pelo primeiro jogador.
  function setupGameTimerCountdown(endTime) {
    if (gameTimerInterval) clearInterval(gameTimerInterval); // Limpa qualquer timer anterior
    gameEnded = false;
    gameTimerElement.style.display = 'flex';

    gameTimerInterval = setInterval(() => {
      const now = Date.now();
      const diff = Math.floor((endTime - now) / 1000);

      timeLeft = Math.max(0, diff);
      timerDisplay.textContent = formatTime(timeLeft);

      if (timeLeft <= 60) {
        gameTimerElement.classList.add("critical");
      } else {
        gameTimerElement.classList.remove("critical"); // Remove se o tempo não for crítico
      }

      if (timeLeft <= 0) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
        endGame();
      }
    }, 1000);
  }

  function endGame() {
    gameEnded = true;
    if (gameTimerInterval) {
      clearInterval(gameTimerInterval);
      gameTimerInterval = null;
    }
    gameTimerElement.style.display = 'none'; // Hide timer
    gridElement.style.display = 'none'; // Hide ducks
    scoreboard.style.display = 'flex'; // Show scoreboard

    displayScores();
  }

  // Função para resetar o jogo COMPLETAMENTE (professor)
  async function resetGame() {
    const teacherInput = prompt("Teacher password to reset ALL game progress:");
    if (teacherInput === null) return;
    if (teacherInput !== TEACHER_PASSWORD) {
      alert("Incorrect teacher password!");
      return;
    }

    if (!confirm("Are you sure you want to reset ALL game progress and scores? This cannot be undone!")) {
      return;
    }

    // Limpa o banco de dados para uma nova partida
    await gameStatusRef.set(null); // Reseta o status do jogo (incluindo endTime)
    await playersRef.set(null);    // Reseta os dados dos jogadores

    // Resetar o localStorage de todos os alunos (opcional, mas recomendado para consistência)
    localStorage.removeItem(ALL_STUDENTS_KEY);
    allStudents = {}; // Limpa o objeto local
    currentHunter = null; // Limpa o caçador atual

    // O listener onValue vai detectar o `gameStatus` como null e chamar `resetGameLocalState()` em todos os clientes.
    // Apenas para garantir que o cliente que iniciou o reset também se atualize:
    resetGameLocalState();
    updateHunterDisplay(); // Garante que o display do caçador seja atualizado
    alert("Game reset for everyone!");
  }

// Função para mostrar o pódio sincronizado com todos os alunos
function displayScores() {
  // Buscamos todos os jogadores no banco de dados
  playersRef.on('value', ((snapshot) => {
    const data = snapshot.val();

    // Limpa os placares anteriores SEMPRE (mesmo se o banco estiver vazio)
    podiumContainer.innerHTML = '';
    allScoresList.innerHTML = '';

    if (!data) return; // Se não houver dados (foi resetado), para aqui com a tela limpa

    // Converte o objeto do banco em uma lista e ordena por Aura
    const sortedHunters = Object.values(data)
      .sort((a, b) => b.totalAura - a.totalAura);

      // Constrói o Pódio (1º, 2º e 3º)
      // Ajustado para garantir que sempre haja 3 posições, mesmo que vazias
      const podiumRanks = ["second", "first", "third"];
      const podiumData = [sortedHunters[1], sortedHunters[0], sortedHunters[2]]; // Pega os 3 primeiros

      podiumData.forEach((hunter, index) => {
        const spot = document.createElement("div");
        spot.className = `podium-spot ${podiumRanks[index]}`;
        if (hunter) {
          spot.innerHTML = `
            <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
            <div class="podium-name">${hunter.name}</div>
            <div class="podium-aura">${hunter.totalAura} Aura</div>
          `;
        } else {
          spot.innerHTML = `
            <div class="podium-rank">${index === 1 ? '🥇' : (index === 0 ? '🥈' : '🥉')}</div>
            <div class="podium-name">---</div>
            <div class="podium-aura">0 Aura</div>
          `;
        }
        podiumContainer.appendChild(spot);
      });

      // Constrói a lista completa de classificação
      sortedHunters.forEach(hunter => {
        const listItem = document.createElement("li");
        listItem.innerHTML = `
          <span>${hunter.name}</span>
          <span>${hunter.totalAura} Aura</span>
        `;
        allScoresList.appendChild(listItem);
      });
    }));
  }

  // NOVO: Função para resetar APENAS o timer no Firebase (professor)
  async function resetFirebaseTimerOnly() {
    const teacherInput = prompt("Teacher password to reset the game timer:");
    if (teacherInput === null) return;
    if (teacherInput !== TEACHER_PASSWORD) {
      alert("Incorrect teacher password!");
      return;
    }
    if (!confirm("Are you sure you want to reset ONLY the game timer for everyone?")) {
      return;
    }
    await gameStatusRef.child('endTime').set(null);
    alert("Game timer reset in Firebase!");
  }

  // --- Initial Setup ---
  renderDucks();
  updateHunterDisplay();
  gameTimerElement.style.display = 'none'; // Hide timer initially until game starts

  function buildCard(duck) {
    const task = tasks[duck.id];

    const card = document.createElement("div");
    card.className = "card";

    const duckBtn = document.createElement("button");
    duckBtn.className = "duck-btn";
    duckBtn.setAttribute("aria-label", `Open Duck ${duck.id}`);

    // Add 'locked' class if game has ended
    if (gameEnded) {
      duckBtn.classList.add('locked');
    }

    duckBtn.innerHTML = `
      <div class="duck-cover ${isCleared(duck.id) ? 'cleared' : ''}">
        <img src="${duck.image}" alt="Duck ${duck.id}">
        ${isCleared(duck.id) ? '<div class="cleared-overlay">✅ HUNTED</div>' : ''}
      </div>
      <div style="display:flex; justify-content:space-between; width:100%; margin-top:4px;">
        <span class="tier-label">${duck.tier}</span>
        <span class="aura-label">+${duck.aura} aura</span>
      </div>
    `;

    const collapse = document.createElement("div");
    collapse.className = "collapse";

    const inner = document.createElement("div");
    inner.className = "collapse-inner";

    const lockDiv = document.createElement("div");
    lockDiv.innerHTML = `
      <div class="label-small">Password from QR</div>
      <div class="pw-row">
        <input type="password" class="pw-input" placeholder="Type the password from your duck">
        <button class="btn unlock-btn">Unlock</button>
      </div>
      <div class="error-msg"></div>
    `;

    const taskDiv = document.createElement("div");
    taskDiv.style.display = "none";

    let taskHTML = "";
    if (task) {
      taskHTML += `<div class="task-text">${task.text}</div>`;
      if (task.note) taskHTML += `<div class="task-note">${task.note}</div>`;
      if (task.gaps && task.gaps.length) {
        taskHTML += `<ul class="gap-list">${task.gaps.map(g => `<li>${g}</li>`).join("")}</ul>`;
        taskHTML += `<textarea class="answer-input" placeholder="${task.placeholder || "Write your answer here."}"></textarea>`;
      } 
      else {
        taskHTML += `<textarea class="answer-input" placeholder="${task.placeholder || "Write your answer here."}"></textarea>`;
      }
    } else {
      taskHTML += `<div class="task-text">No mission yet. Ask your teacher.</div>`;
    }
    taskHTML += `<button class="btn approve-btn">Ask teacher to approve ✅</button>`;
    taskDiv.innerHTML = taskHTML;

    // --- CORREÇÃO DO TEXTAREA: garante placeholder e remove qualquer \n inicial ---
    const answerTextarea = taskDiv.querySelector(".answer-input");
    if (answerTextarea) {
      // Pega o placeholder que foi definido no HTML (se houver)
      const currentPlaceholder = answerTextarea.getAttribute("placeholder");

      // Limpa TODO e qualquer conteúdo interno (inclusive \n ou texto "value")
      answerTextarea.textContent = ""; // Garante que não há texto entre <textarea> e </textarea>
      answerTextarea.value = "";       // Garante que o atributo value está vazio

      // Se não havia placeholder no HTML, define um padrão
      if (!currentPlaceholder) {
        answerTextarea.setAttribute("placeholder", "Write your answer here.");
      }
      // Se por algum motivo o placeholder veio como textContent, move ele para o atributo
      else if (answerTextarea.textContent && !answerTextarea.getAttribute("placeholder")) {
        answerTextarea.setAttribute("placeholder", answerTextarea.textContent.trim());
        answerTextarea.textContent = ""; // Limpa novamente após mover
      }
    }

    const successDiv = document.createElement("div");
    successDiv.className = "success-area";
    successDiv.style.display = "none";
    successDiv.innerHTML = `
      <div class="success-main">✅ Approved!</div>
      <div class="success-sub">🔥 You just farmed +${duck.aura} aura!</div>
      <div class="success-timer">Locking again in <span class="timer-count">5</span>s…</div>
    `;

    inner.appendChild(lockDiv);
    inner.appendChild(taskDiv);
    inner.appendChild(successDiv);
    collapse.appendChild(inner);
    card.appendChild(duckBtn);
    card.appendChild(collapse);

    duckBtn.addEventListener("click", () => {
      if (gameEnded) { // If game has ended, prevent opening cards
        alert("The game has ended. You can view scores but not play.");
        return;
      }
      if (!currentHunter) {
        alert("Please enter your hunter name first to start playing!");
        return;
      }
      if (!canAccessDuck(duck)) {
        alert(accessMessage(duck));
        return;
      }
      const open = collapse.classList.contains("open");
      collapse.classList.toggle("open", !open);
    });

    const pwInput   = lockDiv.querySelector(".pw-input");
    const unlockBtn = lockDiv.querySelector(".unlock-btn");
    const errorMsg  = lockDiv.querySelector(".error-msg");

    function tryUnlock() {
      if (gameEnded) { return; } // Prevent unlocking if game ended
      if (!currentHunter) { alert("Please enter your hunter name first!"); return; }

      const val = (pwInput.value || "").trim();
      if (!val) { errorMsg.textContent = "Type the password from your duck QR."; return; }
      // NOVO: Verifica se a senha digitada é a senha do pato OU a senha mestra do professor
      if (val.toUpperCase() !== duck.password.toUpperCase() && val.toUpperCase() !== MASTER_TEACHER_PASSWORD.toUpperCase()) {
        errorMsg.textContent = "Wrong password. Check your QR code again, or ask your teacher for the master password.";
        return;
      }
      errorMsg.textContent = "";
      lockDiv.style.display = "none";
      taskDiv.style.display = "flex";
      taskDiv.style.flexDirection = "column";
      taskDiv.style.gap = "8px";
      const ta = taskDiv.querySelector(".answer-input");
      if (ta) {
        ta.value = ""; 
        ta.textContent = "";
        ta.focus();
      }
    }

    unlockBtn.addEventListener("click", tryUnlock);
    pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });

    const approveBtn = taskDiv.querySelector(".approve-btn");
    if (approveBtn) {
      approveBtn.addEventListener("click", () => {
        if (gameEnded) { return; } // Prevent approving if game ended
        const teacherInput = prompt("Teacher password:"); // Abre uma caixa para digitar a senha
        if (teacherInput === null) { // Se o professor clicou em "Cancelar" no prompt
          return; // Não faz nada e sai da função
        }
        if (teacherInput !== TEACHER_PASSWORD) { // Se a senha digitada for diferente da senha definida
          alert("Incorrect teacher password!"); // Mostra um alerta de senha incorreta
          return; // Não faz nada e sai da função
        }
        markCleared(duck);

        taskDiv.style.display = "none";
        successDiv.style.display = "flex";
        successDiv.style.flexDirection = "column";
        successDiv.style.gap = "4px";

        const timerSpan = successDiv.querySelector(".timer-count");
        let t = 5;
        timerSpan.textContent = t;
        const iv = setInterval(() => {
          t--;
          timerSpan.textContent = t;
          if (t <= 0) {
            clearInterval(iv);
            successDiv.style.display = "none";
            lockDiv.style.display    = "block";
            taskDiv.style.display    = "none";
            pwInput.value = "";
            collapse.classList.remove("open");
            renderDucks();
          }
        }, 1000);
      });
    }

    return card;
  }
</script>
</body>
</html>
